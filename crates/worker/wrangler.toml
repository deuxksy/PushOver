name = "pushover-worker"
compatibility_date = "2024-01-01"
account_id = "e0924c382d21ac0f10aee606b82687ce"
main = "build/worker/shim.mjs"

# D1 Database bindings
[[d1_databases]]
binding = "DB"
database_name = "pushover-db"
database_id = "b8714aa2-58ce-40c7-873f-b8b94e2d53c3"

# KV Namespace (token cache, webhook cache, failed message backup)
[[kv_namespaces]]
binding = "KV"
id = "5715dcaacdce43c08a9c3ea1723942d0"

# Queue (Producer-Consumer)
[[queues.producers]]
queue = "pushover-messages"
binding = "MESSAGE_QUEUE"

[[queues.consumers]]
queue = "pushover-messages"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3

# R2 Bucket (message images)
[[r2_buckets]]
binding = "R2"
bucket_name = "pushover-images"

# R2 Bucket (D1 backups)
[[r2_buckets]]
binding = "BACKUP_R2"
bucket_name = "pushover-backups"

# Environment variables
[vars]
PUSHOVER_API_URL = "https://api.pushover.net"
PUSHOVER_WEBHOOK_SECRET = "C4VZclx+sZDWEBW9Qq0nvROE3asqkMLWOzP8CiWlF5s="

# Cron Triggers are# Cron Triggers are managed by Terraform
# See: infrastructure/main.tf - cloudflare_workers_cron_trigger.recovery
# Schedules: */5 * * * * (every 5 minutes)# To modify schedule,# Update infrastructure/main.tf and# cloudflare_workers_cron_trigger.recovery
# schedules = [{ cron = "*/5 * * * *" }] }]

# Build configuration
[build]
command = "cargo install worker-build && worker-build --release"
