name: D1 Full Backup

on:
  schedule:
    - cron: '0 18 * * *'   # 매일 18:00 UTC (한국 시간 03:00)
  workflow_dispatch:         # 수동 실행 가능

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: DEV
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Export D1 to SQL dump
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          wrangler d1 export pushover-db --remote --output=d1-backup-${TIMESTAMP}.sql
          echo "BACKUP_FILE=d1-backup-${TIMESTAMP}.sql" >> $GITHUB_ENV

      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler r2 object put pushover-backups/d1-full-backup/${BACKUP_FILE} --file=${BACKUP_FILE}

      - name: Cleanup old backups (7-day retention)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          CUTOFF=$(date -u -d '7 days ago' +%Y%m%d)
          echo "Cutoff date: $CUTOFF"

          # Cloudflare R2 S3-compatible API로 객체 목록 조회
          # wrangler에는 r2 object list/delete 명령이 없으므로 REST API 사용
          API="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/r2/buckets/pushover-backups/objects"

          # 객체 목록 조회
          OBJECTS=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" "$API" | jq -r '.result[]?.key // empty')

          if [ -z "$OBJECTS" ]; then
            echo "No objects found in d1-full-backup/"
            exit 0
          fi

          echo "$OBJECTS" | while read -r key; do
            # d1-full-backup/ 프리픽스가 없는 객체는 스킵
            case "$key" in
              d1-full-backup/*) ;;
              *) continue ;;
            esac

            DATE_PART=$(echo "$key" | grep -oP '\d{8}' | head -1)
            if [ -n "$DATE_PART" ] && [ "$DATE_PART" -lt "$CUTOFF" ]; then
              echo "Deleting old backup: $key"
              curl -s -X DELETE \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                "$API/$key" > /dev/null
            fi
          done
