name: D1 Full Backup

on:
  schedule:
    - cron: '0 18 * * *'   # 매일 18:00 UTC (한국 시간 03:00)
  workflow_dispatch:         # 수동 실행 가능

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: DEV
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Export D1 to SQL dump
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          wrangler d1 export pushover-db --remote --output=d1-backup-${TIMESTAMP}.sql
          echo "BACKUP_FILE=d1-backup-${TIMESTAMP}.sql" >> $GITHUB_ENV

      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler r2 object put pushover-backups/d1-full-backup/${BACKUP_FILE} --file=${BACKUP_FILE} --remote

      # R2 Lifecycle Rule이 7일 초과 백업 자동 삭제
      # 설정: wrangler r2 bucket lifecycle add pushover-backups d1-backup-retention d1-full-backup/ --expire-days 7 --force
